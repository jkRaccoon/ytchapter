name: Deploy to ytchapter.bal.pe.kr

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: Generate .env
        run: node infra/microsaas-infra/scripts/ga4/write-env.mjs ytchapter
      - run: npm run build
      - run: npm install
        working-directory: infra
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::778021795831:role/microsaas-github-deploy
          aws-region: ap-northeast-2
      - run: npx cdk deploy --all --require-approval never
        working-directory: infra
